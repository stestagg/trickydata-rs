name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Download latest released corpus
        env:
          GH_TOKEN: ${{ secrets.TRICKYDATA_INPUTS_TOKEN || github.token }}
        run: |
          mkdir -p .inputs
          gh release download \
            --repo stestagg/trickydata-inputs \
            --pattern 'trickydata.trickydata' \
            --dir .inputs \
            --clobber
          test -f .inputs/trickydata.trickydata

      - name: Vendor corpus
        run: scripts/sync-data.sh .inputs

      - name: Check
        run: cargo check --workspace --all-targets --all-features

      - name: Test
        run: cargo test --workspace --all-features
